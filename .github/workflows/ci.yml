name: FastAPI CI Pipeline

# 1. TETİKLEYİCİ: Bu pipeline ne zaman çalışsın?
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 2. GÖREVLER (Jobs): Neler yapılacak?
jobs:
  build-and-test:
    runs-on: ubuntu-latest # GitHub'ın bize sağladığı temiz bir Linux makinesi

    # 3. ADIMLAR (Steps): Makinede sırasıyla çalışacak komutlar
    steps:
    - name: Kodu Çek (Checkout)
      uses: actions/checkout@v3

    - name: Python Ortamını Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Testleri Çalıştır
      run: |
        pytest
    - name: Docker İmajını Derle
      run: |
        docker build -t my-fastapi-app:${{ github.sha }} .	
